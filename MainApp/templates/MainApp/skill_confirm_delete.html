{% extends 'base.html' %}
{% block title %}Delete Skill | Campus SkillSwap{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title">Delete skill</h2>
                <p>Are you sure you want to delete <strong>{{ skill.title }}</strong>? This cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">Yes, delete</button>
                    <a class="btn btn-secondary ms-2" href="{% url 'skill_detail' skill.pk %}">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
